<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOKES Employability Skills Curriculum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Variables — Canonical 11-Color Palette Only ===== */
        :root {
            --primary: #007baf;
            --accent: #37b550;
            --dark: #004071;
            --light: #FFFFFF;
            --muted: #EDF3F7;
            --gray: #60636b;
            --gold: #d3b257;
            --royal: #00133f;
            --mauve: #a7253f;
            --offwhite: #d1d3d4;
            --muted-gold: #ad8806;
        }

        /* ===== Reset ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== Base ===== */
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--muted);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Header ===== */
        header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
            color: var(--light);
            padding: 5rem 2rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 64, 113, 0.18);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 150%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% -50%, rgba(55, 181, 80, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .spokes-logo-frame {
            width: clamp(250px, 38vw, 420px);
            aspect-ratio: 3 / 2;
            margin: 0 auto 1.25rem;
            background: var(--light);
            border-radius: 14px;
            padding: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(0, 64, 113, 0.28);
        }

        .spokes-logo {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 6px 14px rgba(0, 64, 113, 0.2));
        }

        .eyebrow {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0, 19, 63, 0.2);
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== Main ===== */
        main {
            flex: 1;
            max-width: 1200px;
            margin: -3rem auto 4rem;
            padding: 0 2rem;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* ===== Dashboard Grid ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* ===== Module Cards ===== */
        .module-card {
            background: var(--light);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 64, 113, 0.06);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
                        box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(209, 211, 212, 0.5);
            border-top: 5px solid var(--primary);
            position: relative;
            animation: cardReveal 0.5s ease-out both;
            animation-delay: calc(var(--i, 0) * 80ms);
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 64, 113, 0.12);
        }

        .module-card:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 4px;
            transform: translateY(-5px);
            box-shadow: 0 18px 36px rgba(0, 64, 113, 0.14);
        }

        .module-card:focus-visible .launch-cta {
            box-shadow: 0 0 0 3px rgba(211, 178, 87, 0.45);
        }

        .module-card--planned {
            cursor: default;
        }

        .module-card--planned:hover {
            transform: none;
            box-shadow: 0 10px 25px rgba(0, 64, 113, 0.06);
        }

        /* ===== Card Header ===== */
        .card-header {
            padding: 2rem 2rem 1.5rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-icon svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            stroke-width: 1.85;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ===== Status Badge ===== */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
        }

        .status-badge--ready {
            background: rgba(55, 181, 80, 0.1);
            color: var(--dark);
        }

        .status-badge--planned {
            background: rgba(96, 99, 107, 0.1);
            color: var(--gray);
        }

        /* ===== Card Body ===== */
        .module-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            padding: 0 2rem;
            color: var(--dark);
        }

        .module-desc {
            color: var(--gray);
            padding: 0 2rem 2rem;
            font-size: 1rem;
            flex-grow: 1;
        }

        /* ===== Card Footer ===== */
        .card-footer {
            padding: 1.25rem 2rem;
            background: transparent;
            border-top: 1px solid rgba(209, 211, 212, 0.5);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: border-color 0.3s ease;
        }

        .module-card:hover .card-footer {
            border-top-color: rgba(209, 211, 212, 0.8);
        }

        .launch-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.58rem 1rem;
            border-radius: 999px;
            font-size: 0.93rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--light);
            background: var(--primary);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .module-card:hover .launch-cta {
            transform: translateX(2px);
            box-shadow: 0 8px 18px rgba(0, 64, 113, 0.18);
        }

        .arrow-icon {
            font-size: 1.25rem;
            line-height: 1;
            transition: transform 0.25s ease;
        }

        .module-card:hover .arrow-icon {
            transform: translateX(5px);
        }

        .planned-label {
            font-size: 0.93rem;
            font-weight: 600;
            color: var(--gray);
            letter-spacing: 0.01em;
        }

        /* ===== Card Reveal Animation ===== */
        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Reduced Motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }

            .module-card {
                opacity: 1 !important;
                transform: none !important;
                animation: none !important;
            }
        }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            header {
                padding: 4rem 1.5rem 3rem;
            }
            main {
                margin-top: -2rem;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }
            .spokes-logo-frame {
                width: clamp(200px, 70vw, 300px);
                margin-bottom: 1rem;
                border-radius: 12px;
                padding: 0.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="spokes-logo-frame">
                <img src="SPOKES-Logo.png" alt="SPOKES logo" class="spokes-logo">
            </div>
            <span class="eyebrow">Interactive Hub</span>
            <h1>Employability Skills Curriculum</h1>
            <p class="subtitle">Select a module below to launch an interactive lesson</p>
        </div>
    </header>

    <main>
        <div class="dashboard-grid" id="dashboardGrid"></div>
    </main>

    <footer>
        <p>&copy; 2026 WV Adult Basic Education. All rights reserved.</p>
    </footer>

    <script>
        /* ===== Theme Map ===== */
        const THEME_MAP = {
            interview:      { topBorder: 'var(--royal)',  accentBg: 'rgba(0, 19, 63, 0.08)',   ctaBg: 'var(--royal)' },
            time:           { topBorder: 'var(--mauve)',  accentBg: 'rgba(167, 37, 63, 0.08)', ctaBg: 'var(--mauve)' },
            accountability: { topBorder: 'var(--accent)', accentBg: 'rgba(55, 181, 80, 0.08)', ctaBg: 'var(--dark)' }
        };

        /* Cycle themes for future lessons */
        const CYCLE_THEMES = [
            { topBorder: 'var(--primary)',   accentBg: 'rgba(0, 123, 175, 0.08)',  ctaBg: 'var(--primary)' },
            { topBorder: 'var(--gold)',      accentBg: 'rgba(211, 178, 87, 0.08)', ctaBg: 'var(--dark)' },
            { topBorder: 'var(--royal)',     accentBg: 'rgba(0, 19, 63, 0.08)',    ctaBg: 'var(--royal)' }
        ];

        function getTheme(themeKey, index) {
            if (THEME_MAP[themeKey]) return THEME_MAP[themeKey];
            return CYCLE_THEMES[index % CYCLE_THEMES.length];
        }

        /* ===== Icon SVG Map ===== */
        const ICON_MAP = {
            briefcase: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path><path d="M3 12h18"></path><path d="M10 12v2h4v-2"></path></svg>',
            clock: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v4l3 2"></path><path d="M9 3h6"></path></svg>',
            checkCircle: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="9"></circle><path d="m8.5 12 2.2 2.2 4.8-4.8"></path></svg>',
            chat: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>',
            star: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>',
            book: '<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>'
        };

        function getIcon(iconKey) {
            return ICON_MAP[iconKey] || ICON_MAP.book;
        }

        /* ===== Fallback Lessons (for file:// protocol) ===== */
        const FALLBACK_LESSONS = [
            {
                id: 'lesson-time-management',
                title: 'Time Management',
                description: 'Master prioritization, scheduling, and daily planning strategies for workplace success.',
                icon: 'clock',
                themeKey: 'time',
                path: "lesson-time-management/index.html",
                status: 'complete'
            },
            {
                id: 'lesson-interview-skills',
                title: 'Interview Skills',
                description: 'Build confidence and master techniques for successful job interviews.',
                icon: 'briefcase',
                themeKey: 'interview',
                path: 'lesson-interview-skills/index.html',
                status: 'complete'
            },
            {
                id: 'lesson-employee-accountability',
                title: 'Employee Accountability',
                description: 'Develop personal responsibility, goal-setting, and professional growth habits.',
                icon: 'checkCircle',
                themeKey: 'accountability',
                path: 'lesson-employee-accountability/index.html',
                status: 'complete'
            }
        ];

        /* ===== Card Builder ===== */
        function isReady(status) {
            return status === 'complete' || status === 'ready';
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, function (char) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return map[char];
            });
        }

        function sanitizeLessonPath(path) {
            const rawPath = String(path ?? '').trim();
            if (!rawPath) return '';
            if (!/^[A-Za-z0-9_./' -]+$/.test(rawPath)) return '';
            if (rawPath.startsWith('/') || rawPath.includes('..')) return '';
            if (!rawPath.toLowerCase().endsWith('.html')) return '';
            return encodeURI(rawPath);
        }

        function buildCard(lesson, index) {
            const theme = getTheme(lesson.themeKey, index);
            const ready = isReady(lesson.status);
            const safePath = ready ? sanitizeLessonPath(lesson.path) : '';
            const isLaunchable = ready && !!safePath;
            const tag = isLaunchable ? 'a' : 'div';
            const hrefAttr = tag === 'a' ? ` href="${safePath}" rel="noopener noreferrer"` : '';
            const plannedClass = isLaunchable ? '' : ' module-card--planned';
            const statusClass = isLaunchable ? 'status-badge--ready' : 'status-badge--planned';
            const statusText = isLaunchable ? 'Ready' : 'Coming Soon';
            const iconColor = theme.topBorder;
            const safeTitle = escapeHtml(lesson.title || 'Untitled Module');
            const safeDescription = escapeHtml(lesson.description || '');

            const footerContent = isLaunchable
                ? `<span class="launch-cta" style="background: ${theme.ctaBg};">Launch Module <span class="arrow-icon" aria-hidden="true">&rarr;</span></span>`
                : `<span class="planned-label">Coming Soon</span>`;

            return `<${tag}${hrefAttr} class="module-card${plannedClass}" style="border-top-color: ${theme.topBorder}; --i: ${index};">
                <div class="card-header">
                    <div class="card-icon" style="background: ${theme.accentBg}; color: ${iconColor};" aria-hidden="true">
                        ${getIcon(lesson.icon)}
                    </div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                <h3 class="module-name">${safeTitle}</h3>
                <p class="module-desc">${safeDescription}</p>
                <div class="card-footer">
                    ${footerContent}
                </div>
            </${tag}>`;
        }

        /* ===== Render ===== */
        function renderDashboard(lessons) {
            const visible = (Array.isArray(lessons) ? lessons : []).filter(l => l && l.status !== 'blocked');
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = visible.map((lesson, i) => buildCard(lesson, i)).join('');
        }

        /* ===== Init ===== */
        document.addEventListener('DOMContentLoaded', function () {
            /* Try fetching registry; fall back for file:// or fetch failure */
            fetch('lesson-registry.json')
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    renderDashboard(data.lessons || []);
                })
                .catch(function () {
                    renderDashboard(FALLBACK_LESSONS);
                });
        });
    </script>

</body>
</html>
